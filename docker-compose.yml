services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermesmanager
      POSTGRES_USER: hermesmanager
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermesmanager"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
