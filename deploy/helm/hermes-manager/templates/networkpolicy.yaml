{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hermesmanager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hermesmanager.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hermesmanager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow API access on port 8080 from any source
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution (kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Postgres (CloudNativePG pods)
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ include "hermesmanager.pgClusterName" . }}
      ports:
        - port: 5432
          protocol: TCP
    # Allow kube-apiserver (needed for K8s runtime driver to create/watch Jobs)
    # NOTE: tighten the CIDR to your apiserver IP range in production
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
