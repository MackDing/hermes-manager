name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o hermesmanager-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/hermesmanager

      - name: Generate checksum
        run: |
          sha256sum hermesmanager-${{ matrix.goos }}-${{ matrix.goarch }} \
            > hermesmanager-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            hermesmanager-${{ matrix.goos }}-${{ matrix.goarch }}
            hermesmanager-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  container-image:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Prepare build context
        run: |
          mkdir -p build/linux/amd64 build/linux/arm64
          cp hermesmanager-linux-amd64 build/linux/amd64/hermesmanager
          cp hermesmanager-linux-arm64 build/linux/arm64/hermesmanager
          chmod +x build/linux/amd64/hermesmanager build/linux/arm64/hermesmanager

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm-chart:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Log in to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml appVersion
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/hermesmanager/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/hermesmanager/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package deploy/helm/hermesmanager

      - name: Push Helm chart to OCI
        run: |
          helm push hermesmanager-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, container-image, helm-chart]
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create checksums file
        run: |
          cat hermesmanager-*.sha256 > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hermesmanager-linux-amd64
            hermesmanager-linux-arm64
            checksums.txt
