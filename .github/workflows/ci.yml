name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (required for embed.FS)
        working-directory: web
        run: npm ci && npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -race ./...

      - name: Go coverage
        run: go test -coverprofile=cover.out ./internal/gateway/... ./internal/policy/... ./internal/runtime/local/... ./internal/runtime/docker/... ./internal/runtime/k8s/... ./internal/scheduler/...
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go-version }}
          path: cover.out
          if-no-files-found: ignore

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build
